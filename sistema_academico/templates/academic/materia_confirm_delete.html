{% extends 'base.html' %}

{% block title %}Eliminar Materia - SGA{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-2xl shadow-lg p-8">
    <div class="flex items-center gap-3 mb-6">
      <i class="fas fa-exclamation-triangle text-red-600 text-3xl"></i>
      <h1 class="text-3xl font-bold text-gray-800">Confirmar Eliminación</h1>
    </div>

    <div class="bg-red-50 border border-red-200 rounded-xl p-6 mb-6">
      <p class="text-gray-700 mb-4">¿Estás seguro de que deseas eliminar esta materia?</p>
      <div class="bg-white rounded-lg p-4">
        <p class="text-xl font-bold text-gray-800">{{ object.nombre }}</p>
        <p class="text-gray-600">{{ object.codigo }}</p>
      </div>
      <p class="text-red-600 font-semibold mt-4">
        <i class="fas fa-exclamation-circle mr-2"></i>
        Esta acción no se puede deshacer.
      </p>
    </div>

    <form method="post" class="flex gap-4">
      {% csrf_token %}
      <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-lg hover:shadow-xl">
        <i class="fas fa-trash mr-2"></i>Sí, Eliminar
      </button>
      <a href="{% url 'materia-list' %}" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 px-6 rounded-xl transition-all text-center">
        <i class="fas fa-times mr-2"></i>Cancelar
      </a>
    </form>
  </div>
</div>
{% endblock %}
