{% extends 'base.html' %}
{% block title %}Eliminar Nota{% endblock %}
{% block content %}

<div class="max-w-md mx-auto">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fas fa-trash text-red-500 text-2xl"></i>
    </div>
    <h2 class="text-xl font-bold text-gray-800 mb-2">¿Eliminar nota?</h2>
    <p class="text-gray-500 mb-6">
      Nota de <strong>{{ object.estudiante.get_full_name }}</strong> en
      <strong>{{ object.materia.nombre }}</strong>: <strong>{{ object.valor }}</strong>.
      Esta acción no se puede deshacer.
    </p>
    <form method="post" class="flex gap-3">
      {% csrf_token %}
      <button type="submit"
              class="flex-1 bg-red-500 text-white py-2.5 rounded-xl hover:bg-red-600 transition-colors font-medium">
        Sí, eliminar
      </button>
      <a href="{% url 'nota-list' %}"
         class="flex-1 text-center bg-gray-100 text-gray-700 py-2.5 rounded-xl hover:bg-gray-200 transition-colors font-medium">
        Cancelar
      </a>
    </form>
  </div>
</div>
{% endblock %}
