{% extends 'base.html' %}
{% block title %}Dashboard{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold text-gray-800 mb-6">Panel de Control</h1>

<!-- Tarjetas de resumen -->
<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
  {% for card in stats %}
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex items-center gap-4 hover:shadow-md transition-shadow">
    <div class="w-12 h-12 rounded-xl flex items-center justify-center {{ card.bg }}">
      <i class="{{ card.icon }} text-xl {{ card.color }}"></i>
    </div>
    <div>
      <p class="text-sm text-gray-500">{{ card.label }}</p>
      <p class="text-2xl font-bold text-gray-800">{{ card.valor }}</p>
    </div>
  </div>
  {% endfor %}
</div>

<!-- Gráficos -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h2 class="text-base font-semibold text-gray-700 mb-4">Promedio por Materia</h2>
    <canvas id="chartPromedios" height="250"></canvas>
  </div>
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h2 class="text-base font-semibold text-gray-700 mb-4">Asistencia Mensual</h2>
    <canvas id="chartAsistencia" height="250"></canvas>
  </div>
</div>

<script>
async function cargarGraficos() {
  const [rProm, rAsist] = await Promise.all([
    fetch('/api/promedios/').then(r => r.json()),
    fetch('/api/asistencia/').then(r => r.json()),
  ]);

  new Chart(document.getElementById('chartPromedios'), {
    type: 'bar',
    data: {
      labels: rProm.labels,
      datasets: [{
        label: 'Promedio',
        data: rProm.data,
        backgroundColor: 'rgba(91,33,182,0.7)',
        borderColor: '#5B21B6',
        borderWidth: 1,
        borderRadius: 6,
      }]
    },
    options: { scales: { y: { min: 0, max: 5 } }, plugins: { legend: { display: false } } }
  });

  new Chart(document.getElementById('chartAsistencia'), {
    type: 'line',
    data: {
      labels: rAsist.labels,
      datasets: [{
        label: 'Presencias',
        data: rAsist.data,
        borderColor: '#10B981',
        backgroundColor: 'rgba(16,185,129,0.1)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#10B981',
      }]
    },
    options: { plugins: { legend: { display: false } } }
  });
}
cargarGraficos();
</script>
{% endblock %}
